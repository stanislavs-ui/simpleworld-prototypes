<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <title>Simple World — Prototypes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
    .card { display: block; background: #151520; border: 1px solid #2a2a3a; border-radius: 12px; padding: 20px; margin-bottom: 12px; text-decoration: none; color: inherit; transition: border-color 0.2s, background 0.2s; }
    .card:hover { border-color: #4ade80; background: #1a1a28; }
    .card h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 4px; }
    .card p { font-size: 13px; color: #888; }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
    .badge-main { background: #4ade8033; color: #4ade80; }
    .badge-dark { background: #818cf833; color: #818cf8; }
  </style>
</head>

  <div class="container">

    <a class="card" href="./wireframes/">

    <a class="card" href="./main_prototype/">

    </a>
    <a class="card" href="./main_prototype/index-standalone.html">

    </a>
    <a class="card" href="./main_prototype/desktop/">

    </a>
  </div>
