<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>SW — карта мира (3D, drag-spin)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#05070d;overflow:hidden;font-family:'DM Sans',system-ui,sans-serif;}
  #app{position:fixed;inset:0;touch-action:none;cursor:grab;}
  #app:active{cursor:grabbing;}
  .top{position:fixed;top:48px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;}
  .brand{font-size:13px;letter-spacing:3px;font-weight:700;color:#f2f2f2;}
  .tag{font-size:12px;color:hsl(0 0% 62%);margin-top:6px;}
  .hint{position:fixed;top:108px;left:0;right:0;text-align:center;color:#5a6;font-size:11px;z-index:10;
        opacity:.9;transition:opacity .6s;pointer-events:none;}
  .bottom{position:fixed;left:20px;right:20px;bottom:40px;z-index:10;display:flex;flex-direction:column;gap:10px;max-width:420px;margin:0 auto;}
  .cta{width:100%;padding:15px;border:none;border-radius:14px;background:#22c55e;color:#04210f;
       font:700 16px 'DM Sans',sans-serif;cursor:pointer;box-shadow:0 0 20px rgba(34,197,94,.45);}
  .login{background:none;border:none;color:hsl(0 0% 70%);font-size:13px;cursor:pointer;}
  /* HTML-лейблы локаций поверх 3D */
  .marker{position:fixed;transform:translate(-50%,-130%);z-index:9;pointer-events:none;white-space:nowrap;
          background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.12);
          border-radius:9px;padding:4px 9px;font-size:10px;font-weight:700;color:#f2f2f2;will-change:transform,opacity;}
  .marker .sub{font-weight:400;font-size:8px;color:hsl(0 0% 62%);}
  .marker.gold{border-color:rgba(234,179,8,.5);}
</style>
</head>
<body>
<div id="app"></div>
<div class="top"><div class="brand">SIMPLE WORLD</div><div class="tag">Мир, который строят его жители</div></div>
<div class="hint" id="hint">покрути планету пальцем 🌍</div>
<div class="marker gold" data-i="0">Хаб<div class="sub">новое задание</div></div>
<div class="marker" data-i="1">Академия</div>
<div class="marker" data-i="2">Портал<div class="sub">🔒 откроется позже</div></div>
<div class="marker" data-i="3">Арена<div class="sub">🔒 откроется позже</div></div>
<div class="bottom"><button class="cta">Заглянуть</button><button class="login">Уже в мире? Войти</button></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const app = document.getElementById('app');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
camera.position.z = 3.1;
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth, innerHeight);
app.appendChild(renderer.domElement);

// starfield
const starGeo = new THREE.BufferGeometry();
const starN = 900, pos = new Float32Array(starN*3);
let seed = 7;
const rnd = () => { seed = (seed*9301+49297)%233280; return seed/233280; };
for(let i=0;i<starN;i++){ const r=20+rnd()*30, t=rnd()*Math.PI*2, p=Math.acos(2*rnd()-1);
  pos[i*3]=r*Math.sin(p)*Math.cos(t); pos[i*3+1]=r*Math.sin(p)*Math.sin(t); pos[i*3+2]=r*Math.cos(p); }
starGeo.setAttribute('position', new THREE.BufferAttribute(pos,3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x9fb6d0, size:0.06, sizeAttenuation:true})));

// planet group
const planet = new THREE.Group();
scene.add(planet);

const tex = new THREE.TextureLoader().load('assets/planet-texture-night.png', t=>{ t.colorSpace = THREE.SRGBColorSpace; });
const globe = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 64),
  new THREE.MeshBasicMaterial({map: tex})
);
planet.add(globe);

// atmosphere glow (backside sphere)
const atmo = new THREE.Mesh(
  new THREE.SphereGeometry(1.06, 64, 64),
  new THREE.MeshBasicMaterial({color:0x56e0ff, transparent:true, opacity:0.10, side:THREE.BackSide, blending:THREE.AdditiveBlending})
);
scene.add(atmo);

// location markers (lat,lon in degrees)
const locs = [
  {lat: 18, lon: -20},  // Хаб
  {lat: -8, lon: -70},  // Академия
  {lat: 38, lon: 55},   // Портал
  {lat: -32, lon: 20}   // Арена
];
const toVec = (lat,lon,r=1.02)=>{ const a=lat*Math.PI/180, b=lon*Math.PI/180;
  return new THREE.Vector3(r*Math.cos(a)*Math.cos(b), r*Math.sin(a), r*Math.cos(a)*Math.sin(b)); };
const colors=[0xeab308,0x22c55e,0x8aa0a8,0x8aa0a8];
const nodes = locs.map((l,i)=>{
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.022,16,16),
    new THREE.MeshBasicMaterial({color:colors[i]}));
  m.position.copy(toVec(l.lat,l.lon));
  planet.add(m); return m;
});
const labels = [...document.querySelectorAll('.marker')];

// drag-to-spin with inertia
let dragging=false, lastX=0, lastY=0, velX=0, velY=0;
const onDown = e=>{ dragging=true; const p=e.touches?e.touches[0]:e; lastX=p.clientX; lastY=p.clientY;
  document.getElementById('hint').style.opacity=0; };
const onMove = e=>{ if(!dragging)return; const p=e.touches?e.touches[0]:e;
  const dx=p.clientX-lastX, dy=p.clientY-lastY; lastX=p.clientX; lastY=p.clientY;
  velY=dx*0.005; velX=dy*0.005;
  planet.rotation.y+=velY; planet.rotation.x=Math.max(-1.1,Math.min(1.1,planet.rotation.x+velX)); };
const onUp = ()=>{ dragging=false; };
app.addEventListener('pointerdown',onDown); addEventListener('pointermove',onMove); addEventListener('pointerup',onUp);

function frame(){
  requestAnimationFrame(frame);
  if(!dragging){ planet.rotation.y+=velY; planet.rotation.x=Math.max(-1.1,Math.min(1.1,planet.rotation.x+velX));
    velY*=0.95; velX*=0.95; if(Math.abs(velY)<0.0004) velY=0.0009; } // лёгкое авто-вращение в покое
  // project markers to screen + hide behind horizon
  nodes.forEach((n,i)=>{
    const wp = n.getWorldPosition(new THREE.Vector3());
    const facing = wp.clone().normalize().dot(camera.position.clone().normalize()); // >0 = к нам
    const sp = wp.clone().project(camera);
    const lab = labels[i];
    if(facing>0.15 && sp.z<1){
      lab.style.left = (sp.x*0.5+0.5)*innerWidth+'px';
      lab.style.top  = (-sp.y*0.5+0.5)*innerHeight+'px';
      lab.style.opacity = Math.min(1,(facing-0.15)*3);
    } else lab.style.opacity = 0;
    n.material.opacity = facing>0 ? 1 : 0.15; n.material.transparent=true;
  });
  renderer.render(scene,camera);
}
frame();
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });
</script>
</body>
</html>
